version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seatfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seatfit
      POSTGRES_USER: seatfit
      POSTGRES_PASSWORD: seatfit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seatfit -d seatfit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
